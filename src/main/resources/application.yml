server:
  servlet:
    context-path: /api

spring:
  application:
    name: nexo-backend

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:fill_in_environment_variables}
    password: ${MAIL_PASSWORD:fill_in_environment_variables}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://localhost:5433/nexo_db
    username: nexo_user
    password: nexo_password
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
#      ddl-auto: update # tables are created if they don't exist, and existing tables are updated if there are changes in the @Entity classes. (Recommended for development)
      ddl-auto: create # tables are recreated from scratch on every application startup. (Convenient for testing authentication)

application:
# TODO: Change the registration link to the correct frontend URL
  frontend-inventation-url: http://localhost:8080
  security:
    jwt:
    # really secret key :)))
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000